<!-- Receipts page for recording incoming goods and validating stock increases. -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CoreInventory | Receipts</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body data-page="receipts">
  <div class="app-shell">
    <aside id="sidebar" class="sidebar"></aside>
    <section class="app-main">
      <header id="navbar" class="topbar"></header>
      <main class="page-body two-column">
        <section class="page-header-block">
          <div>
            <span class="eyebrow">Inbound</span>
            <h1>Receipts</h1>
            <p>Register incoming goods, validate quantities, and post stock increases with full traceability.</p>
          </div>
          <div class="surface-note">
            Supplier receipts instantly update stock and create ledger entries when validated.
          </div>
        </section>

        <section class="panel">
          <div class="panel-header"><h1>Receipts</h1></div>
          <div id="receipts-table" class="table-wrap"></div>
        </section>
        <section class="panel">
          <div class="panel-header"><h2>Create Receipt</h2></div>
          <form id="receipt-form" class="stack-form">
            <label><span>Supplier</span><input type="text" name="supplier_name" required /></label>
            <label><span>Warehouse</span><select name="warehouse_id" required></select></label>
            <label><span>Location</span><select name="location_id" required></select></label>
            <label>
              <span>Status</span>
              <select name="status">
                <option value="draft">Draft</option>
                <option value="validated">Validate Immediately</option>
              </select>
            </label>
            <label><span>Notes</span><textarea name="notes" rows="3"></textarea></label>
            <div class="line-items-header">
              <h3>Receipt Items</h3>
              <button type="button" id="add-receipt-item" class="ghost-button">Add Item</button>
            </div>
            <div id="receipt-items" class="line-items"></div>
            <button type="submit" class="primary-button">Save Receipt</button>
          </form>
          <p id="receipt-message" class="status-message"></p>
        </section>
      </main>
    </section>
  </div>

  <script src="./js/api.js"></script>
  <script src="./js/layout.js"></script>
  <script src="./js/operations.js"></script>
  <script src="./js/receipts.js"></script>
</body>
</html>
